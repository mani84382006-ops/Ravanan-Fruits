<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ravanaan Fruit Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1> Ravanaan Fruit Shop</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>
</header>




<button onclick="filterProducts('fruit')">Fruits</button>
<button onclick="filterProducts('basket')">Baskets</button>


<div class="card fruit"></div>


<section class="products">
    <h2>Our Products</h2>

    <div class="product-container">

        <!-- Honey Banana -->
        <div class="card">
            <img src="honey banan.png" alt="Honey Banana">
            <h3>Honey Banana</h3>
            <p>₹70 / KG</p>
            <input type="checkbox" class="product-check" data-name="Honey Banana" data-price="70">
         <br>
         <input type="number" class="qty" placeholder="Qty" min="1">
        </div>

        <!-- Kerala Banana -->
        <div class="card">
            <img src="Kerala Bana.png" alt="Kerala Banana">
            <h3>Kerala Banana</h3>
            <p>₹80 / KG</p>
             <input type="checkbox" class="product-check" data-name="Kerala Bana" data-price="70">
         <br>
         <input type="number" class="qty" placeholder="Qty" min="1">
        </div>

        <!-- Red Banana -->
        <div class="card">
            <img src="Red Banana.png" alt="Red Banana">
            <h3>Red Banana</h3>
            <p>₹90 / KG</p>
            <input type="checkbox" class="product-check" data-name="Red Banana.png" data-price="70">
            <br>
           <input type="number" class="qty" placeholder="Qty" min="1">
        </div>

        <!-- Green Banana -->
         <div class="card">
        <img src="Green Bana.jpg" alt="Green Banana">
        <h3>Green Banana</h3>
        <p>₹50 / KG</p>
        <input type="checkbox" class="product-check" data-name="Green Bana.jpg" data-price="70">
            <br>
           <input type="number" class="qty" placeholder="Qty" min="1">
         </div>

    </div>
</section>
<section id="products">

  <h2>Our Products</h2>

  <!-- SEARCH -->
  <input type="text" id="search" placeholder="Search fruits...">

  


<section class="order-form">
    <h2>Place Your Order</h2>

    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <textarea id="address" placeholder="Delivery Address" required></textarea>

    <button onclick="getLocation()">Get Live Location</button>
    <p id="locationText">Location not selected</p>

    <button onclick="placeOrder()">Place Order via WhatsApp</button>
</section>




  </div>
</section>





<section id="contact">
    <h2>Contact Us</h2>
  <p>📞9092921262 </p>
  <p>📍 Your Shop Location</p>
</section>

<button id="topBtn">↑</button>

<footer>
  <p>© 2026 Ravanaan Fruit Shop</p>
</footer>

<script src="script.js"></script>

</body>
</html>
